<!DOCTYPE html>
<html>
<head>
    <title>QVault – Audit Logs</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #222; color: white; }
        .ok { color: green; font-weight: bold; }
        .bad { color: red; font-weight: bold; }
    </style>
</head>
<body>

<h2>🔍 QVault – Audit Logs</h2>

<p>
    Logged in as <b>{{ user }}</b> |
    <a href="/dashboard">Dashboard</a> |
    <a href="/logout">Logout</a>
</p>

<table>
<tr>
    <th>User</th>
    <th>Action</th>
    <th>File</th>
    <th>Target</th>
    <th>QKD Session</th>
    <th>QBER</th>
    <th>Status</th>
    <th>Time</th>
</tr>

{% for log in logs %}
<tr>
    <td>{{ log[0] }}</td>
    <td>{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
    <td>{{ log[3] }}</td>
    <td>{{ log[4] }}</td>
    <td>{{ log[5] }}</td>
    <td class="{{ 'bad' if log[6]=='BLOCKED' else 'ok' }}">{{ log[6] }}</td>
    <td>{{ log[7] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
